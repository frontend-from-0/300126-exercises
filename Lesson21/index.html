<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
    <form novalidate id="checkoutForm"  method="post">
      <div class="input-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="email@example.com"
          name="email"
          maxlength="100"
          aria-describedby="emailError"
        />
        <p id="emailError" class="input-error hidden" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="phone">Phone</label>
        <input
          id="phone"
          type="tel"
          placeholder="555 123 4567"
          name="phoneNumber"
          maxlength="20"
          aria-describedby="phoneError"
        />
        <p id="phoneError" class="input-error hidden" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="firstname">First Name</label>
        <input
          id="firstname"
          type="text"
          placeholder="Sophia"
          name="firstname"
          maxlength="50"
          aria-describedby="firstNameError"
        />
        <p id="firstNameError" class="input-error hidden" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="lastname">Last Name</label>
        <input id="lastname" type="text" placeholder="Clark" name="lastname" maxlength="50" aria-describedby="lastNameError" />
        <p id="lastNameError" class="input-error hidden" aria-live="polite"></p>
      </div>

      <div class="input-group">
        <label for="cardnumber">Card Number</label>
        <input
          id="cardnumber"
          type="text"
          placeholder="1234 5678 9101 1121"
          name="cardnumber"
          maxlength="19"
          inputmode="numeric"
          aria-describedby="cardError"
        />
      <p id="cardError" class="input-error hidden" aria-live="polite"></p>

      </div>
      <div class="input-group">
        <label for="expDate">Expiration Date</label>
        <input id="expDate" type="text" placeholder="MM/YY" name="expDate" maxlength="5" inputmode="numeric" aria-describedby="expDateError" />
        <!-- new: error placeholder for expiration date, same pattern as the other fields -->
        <p id="expDateError" class="input-error hidden" aria-live="polite"></p>
      </div>
      <div class="input-group">
        <label for="cvv">CVV</label>
        <input id="cvv" type="text" placeholder="123" name="cvv" maxlength="4" inputmode="numeric" aria-describedby="cvvError" />
        <!-- new: error placeholder for CVV, same pattern as the other fields -->
        <p id="cvvError" class="input-error hidden" aria-live="polite"></p>
      </div>
      <button type="submit" class="btn-success">Place Order</button>
    </form>
    <!-- role="alert" + tabindex so screen readers announce success and focus moves here -->
    <div class="hidden" id="success" role="alert" tabindex="-1">
      <p>Success! Your order has been placed. A confirmation email is on its way to you.</p>
    </div>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
