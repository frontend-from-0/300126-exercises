<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container" id="form-content">
      <header>
        <h1>Book an Appointment</h1>
      </header>

      <form class="booking" id="booking-form">
        <section class="calendar">
          <label for="fullname">Fullname</label>
          <input type="text" id="fullname" placeholder="Emma Merryweather" />
          <span id="fullname-error" class="error-message"></span>
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Example@mail.com" />
          <span id="email-error" class="error-message"></span>
          <label for="date">Select a date</label>
          <input type="date" id="date" />
          <h2 id="timeslots-heading">Available Time Slots</h2>
          <fieldset class="timeslots" aria-labelledby="timeslots-heading">
            <legend class="hidden">Choose a time slot</legend>
            <button
              class="slot"
              type="button"
              aria-pressed="false"
              aria-label="Select 09:00 time slot"
            >
              09:00
            </button>
            <button
              class="slot"
              type="button"
              aria-pressed="false"
              aria-label="Select 10:30 time slot"
            >
              10:30
            </button>
            <button
              class="slot"
              type="button"
              aria-pressed="false"
              aria-label="Select 13:00 time slot"
            >
              13:00
            </button>
            <button
              class="slot"
              type="button"
              aria-pressed="false"
              aria-label="Select 14:30 time slot"
            >
              14:30
            </button>
            <button
              class="slot"
              type="button"
              aria-pressed="false"
              aria-label="Select 16:00 time slot"
            >
              16:00
            </button>
          </fieldset>
        </section>

        <aside class="summary">
          <h2>Your Appointment</h2>
          <p>Fullname: <span id="writed-fullname">-</span></p>
          <p>Email: <span id="writed-email">-</span></p>
          <p>Date: <span id="selected-date">-</span></p>
          <p>Time: <span id="selected-time">-</span></p>
          <button id="confirm" disabled>Confirm Booking</button>
        </aside>
      </form>
    </div>

    <div class="container hidden" id="confirmation-message">
      <svg class="checkmark" viewBox="0 0 52 52">
      <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"></circle>
      <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"></path>
      </svg>
      <header>
        <h1>Your appointment is confirmed</h1>
      </header>
      <p><span id="appointment-fullname"></span></p>
      <p><span id="appointment-email"></span></p>
      <p><span id="appointment-date">-</span></p>
      <p><span id="appointment-time">-</span></p>
      <button id="reset-button">Book Another Appointment</button>
    </div>

    

    <script src="script.js"></script>
  </body>
</html>
