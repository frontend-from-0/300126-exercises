<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Booking</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="container" id="form-content">
    <header>
      <h1>Book an Appointment</h1>
    </header>

    <form class="booking" id="booking-form">
      <section class="calendar">
        <!-- MD step1-->
        <label for="userName">Name</label> 
        <input type="text" id="userName" placeholder="Enter your name" /> 
        <label for="userEmail">Email</label> 
        <input type="email" id="userEmail" placeholder="Enter your email" />
        <!-- MD step1 finished -->
        <label for="date">Select a date</label>
        <input type="date" id="date" />
        <h2 id="timeslots-heading">Available Time Slots</h2>
        <fieldset class="timeslots" aria-labelledby="timeslots-heading">
          <legend class="hidden">Choose a time slot</legend>
          <button class="slot" type="button" aria-label="Select 09:00 time slot">09:00</button>
          <button class="slot" type="button" aria-label="Select 10:30 time slot">10:30</button>
          <button class="slot" type="button" aria-label="Select 13:00 time slot">13:00</button>
          <button class="slot" type="button" aria-label="Select 14:30 time slot">14:30</button>
          <button class="slot" type="button" aria-label="Select 16:00 time slot">16:00</button>
        </fieldset>
      </section>

      <aside class="summary">
        <h2>Your Appointment</h2>
        <!-- MD step2 -->
        <p>Name: <span id="selected-name">-</span></p> 
        <p>Email: <span id="selected-email">-</span></p>
        <!-- MD step2 finished -->
        <p>Date: <span id="selected-date">-</span></p>
        <p>Time: <span id="selected-time">-</span></p>
        <button id="confirm" disabled>Confirm Booking</button>
      </aside>
    </form>
  </div>

  <!-- MD step5: Create a new container for the confirmation message -->
  <div class="container hidden" id="confirmation-message">
    <header>
      <h1 style="color: #2e7d32;">Your appointment is confirmed! 🎉</h1>
      <p><em>Thank you for your booking. Here are the details: </em></p>
    </header>
    <div class="confirmation-details">
      <p><strong>Name:</strong> <span id="conf-name"></span></p>
      <p><strong>Email:</strong> <span id="conf-email"></span></p>
      <p><strong>Date:</strong> <span id="conf-date"></span></p>
      <p><strong>Time:</strong> <span id="conf-time"></span></p>
    </div>
  </div>
  <!-- MD step5 finished -->
  <script src="script.js"></script>
</body>

</html>
