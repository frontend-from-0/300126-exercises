<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointment Booking</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container" id="form-content">
      <header>
        <h1>Book an Appointment</h1>
      </header>

      <form class="booking" id="booking-form">
        <section class="calendar">
          <label for="date">Select a date</label>
          <input type="date" id="date" />
          <h2 id="timeslots-heading">Available Time Slots</h2>
          <fieldset class="timeslots" aria-labelledby="timeslots-heading">
            <legend class="hidden">Choose a time slot</legend>
            <button
              class="slot"
              type="button"
              aria-label="Select 09:00 time slot"
            >
              09:00
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 10:30 time slot"
            >
              10:30
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 13:00 time slot"
            >
              13:00
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 14:30 time slot"
            >
              14:30
            </button>
            <button
              class="slot"
              type="button"
              aria-label="Select 16:00 time slot"
            >
              16:00
            </button>
          </fieldset>
        </section>

        <aside class="summary">
          <h2>Your Appointment</h2>
          <p>Name: <span id="display-username">-</span></p>
          <p>Email: <span id="display-email">-</span></p>
          <p>Date: <span id="selected-date">-</span></p>
          <p>Time: <span id="selected-time">-</span></p>
          <button id="confirm" disabled>Confirm Booking</button>
        </aside>
      </form>
    </div>

    <div class="container hidden" id="confirmation-message">
      <header>
        <h1>Booking Confirmed</h1>
      </header>
    </div>

    <div id="login-page" class="page-login">
      <div class="login-container">
        <h2>Welcome to the appointment page</h2>
        <p>Please write your information for access to booking page</p>

        <form action="" id="login-form">
          <div class="input-group">
            <label for="username">User Name</label>
            <input
              type="text"
              id="username"
              required
              placeholder="Name and Last Name"
            />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input
              type="text"
              id="email"
              required
              placeholder="forexample@mail.com"
            />
          </div>
          <button type="submit" class="submit-btn">Save</button>
        </form>
      </div>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
